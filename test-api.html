<!DOCTYPE html>
<html>
<head>
    <title>API CORS Test</title>
</head>
<body>
    <h1>API CORS Test from Vercel Domain</h1>
    <div id="result"></div>

    <script>
        async function testRegistration() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';

            try {
                const response = await fetch('https://dizitrends.cardzey.com/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'test123456',
                        name: 'Test User',
                        role: 'candidate'
                    }),
                    credentials: 'include'
                });

                const data = await response.json();

                resultDiv.innerHTML = `
                    <h2>Response Status: ${response.status} ${response.statusText}</h2>
                    <h3>Response Headers:</h3>
                    <pre>${JSON.stringify(Object.fromEntries(response.headers.entries()), null, 2)}</pre>
                    <h3>Response Body:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <h2>Error</h2>
                    <pre>${error.message}</pre>
                    <p>Check browser console for more details (F12 → Console → Network tab)</p>
                `;
                console.error('Fetch error:', error);
            }
        }

        // Run test on page load
        testRegistration();
    </script>
</body>
</html>
